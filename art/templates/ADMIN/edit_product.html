{% extends "ADMIN/commen.html" %}
{% load static %}
{% block content %}

<div class="page-section contact-page">
    <div class="contact-warp">
        <h2>Edit Product</h2>

        <div style="background:white; padding:20px; border-radius:8px; border:1px solid #ddd; width:50%; margin:auto;">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <label>Product Name</label>
                <input type="text" name="name" value="{{ product.name }}" class="form-control" required>

                <label>Category</label>
                <input type="text" name="category" value="{{ product.category }}" class="form-control" required>

                <label>Price</label>
                <input type="number" name="price" value="{{ product.price }}" class="form-control" required>

                <label>Quantity</label>
                <input type="number" name="qty" value="{{ product.qty }}" class="form-control" required>

                <label>Description</label>
                <textarea name="desc" class="form-control" required>{{ product.desc }}</textarea>

                <label>Status</label>
                <select name="status" class="form-control">
                    <option value="Available" {% if product.status == "Available" %}selected{% endif %}>Available</option>
                    <option value="Out of Stock" {% if product.status == "Out of Stock" %}selected{% endif %}>Out of Stock</option>
                </select>

                <label>Current Image</label><br>
                <img src="{{ product.image.url }}" width="120" style="border-radius:8px;"><br><br>

                <label>Change Image (optional)</label>
                <input type="file" name="image" class="form-control">

                <button type="submit" 
                        style="margin-top:10px; padding:8px 20px; background:#4b49ac; color:white; border-radius:5px; border:none;">
                    Update Product
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
