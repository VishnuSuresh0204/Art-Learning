{% extends "ADMIN/commen.html" %}
{% load static %}
{% block content %}

<style>
    .form-section {
        padding: 60px 0;
        min-height: 80vh;
        background: #f8fafc;
    }

    .form-glass-card {
        background: white;
        border-radius: 30px;
        padding: 50px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        border: 1px solid #f1f5f9;
        max-width: 700px;
        margin: 0 auto;
    }

    .form-glass-card h2 {
        font-weight: 800;
        margin-bottom: 30px;
        color: #1e293b;
        text-align: center;
        font-size: 2rem;
    }

    .premium-form .form-group {
        margin-bottom: 25px;
    }

    .premium-form label {
        font-weight: 700;
        color: #475569;
        margin-bottom: 10px;
        display: block;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .premium-form .form-control {
        border-radius: 12px;
        padding: 12px 18px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        transition: all 0.3s ease;
        height: auto;
    }

    .premium-form .form-control:focus {
        border-color: #4b49ac;
        box-shadow: 0 0 0 4px rgba(75, 73, 172, 0.1);
        background: white;
    }

    .btn-submit {
        background: #4b49ac;
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 14px;
        font-weight: 700;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s ease;
        font-size: 1.1rem;
    }

    .btn-submit:hover {
        background: #3f3e91;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(75, 73, 172, 0.2);
    }
</style>

<div class="form-section">
    <div class="container">
        <div class="form-glass-card">
            <h2>Edit Video</h2>
            <form method="POST" class="premium-form">
                {% csrf_token %}

                <div class="form-group">
                    <label>Video Title</label>
                    <input type="text" name="title" class="form-control" placeholder="Enter a catchy title"
                        value="{{ video.title }}" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" placeholder="What is this video about?"
                        rows="3">{{ video.description }}</textarea>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" name="category" class="form-control" placeholder="e.g. Painting"
                                value="{{ video.category }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" class="form-control">
                                <option value="active" {% if video.status=='active' %}selected{% endif %}>Active
                                </option>
                                <option value="inactive" {% if video.status=='inactive' %}selected{% endif %}>Inactive
                                </option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>YouTube Link</label>
                    <input type="url" name="video_link" class="form-control" placeholder="https://youtube.com/..."
                        value="{{ video.video_link }}" required>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa fa-save mr-2"></i> Save Changes
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
