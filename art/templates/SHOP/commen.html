{% load static %}
<!DOCTYPE html>
<html lang="zxx">

<head>
    <title>Art Learning - Shop Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link href="/static/img/favicon.ico" rel="shortcut icon" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=PT+Sans:400,400i,700,700i" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/css/font-awesome.min.css" />
    <link rel="stylesheet" href="/static/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="/static/css/animate.css" />

    <!-- Main Stylesheets -->
    <link rel="stylesheet" href="/static/css/style.css" />

</head>

<body>
    <!-- Page Preloder -->
    <div id="preloder">
        <div class="loader"></div>
    </div>

    <div class="main-warp">
        <!-- header section -->
        <header class="header-section">
            <div class="header-close">
                <i class="fa fa-times"></i>
            </div>
            <div class="header-warp">
                <a href="" class="site-logo">
                    <img src="/static/img/logo.png" alt="">
                </a>
                <img src="/static/img/menu-icon.png" alt="" class="menu-icon">
                <ul class="main-menu">
                    <li class="{% if request.path == '/shop_home/' %}active{% endif %}"><a href="/shop_home">Home</a>
                    </li>
                    <li class="{% if request.path == '/shop_add_product/' %}active{% endif %}"><a
                            href="/shop_add_product">Add Product</a></li>
                    <li class="{% if request.path == '/shop_view_products/' %}active{% endif %}"><a
                            href="/shop_view_products">My Products</a></li>
                    <li class="{% if request.path == '/shop_view_bookings/' %}active{% endif %}"><a
                            href="/shop_view_bookings">Bookings</a></li>
                    <li><a href="/login">Log Out</a></li>
                </ul>
                <div class="social-links-warp">
                    <div class="social-links">
                        <a href=""><i class="fa fa-behance"></i></a>
                        <a href=""><i class="fa fa-dribbble"></i></a>
                        <a href=""><i class="fa fa-twitter"></i></a>
                        <a href=""><i class="fa fa-facebook"></i></a>
                        <a href=""><i class="fa fa-pinterest"></i></a>
                    </div>
                    <div class="social-text">Find us on</div>
                </div>
            </div>
            <div class="copyright">Colorlib 2018 @ All rights reserved</div>
        </header>
        <!-- header section end -->

        {% block content %}
        {% endblock %}

        <!--====== Javascripts & Jquery ======-->
        <script src="/static/js/jquery-3.2.1.min.js"></script>
        <script src="/static/js/bootstrap.min.js"></script>
        <script src="/static/js/owl.carousel.min.js"></script>
        <script src="/static/js/jquery.nicescroll.min.js"></script>
        <script src="/static/js/isotope.pkgd.min.js"></script>
        <script src="/static/js/imagesloaded.pkgd.min.js"></script>
        <script src="/static/js/circle-progress.min.js"></script>
        <script src="/static/js/main.js"></script>
</body>

</html>
