{% extends "SHOP/commen.html" %}

{% block content %}

<!-- Page section -->
<div class="page-section contact-page">
    <div class="contact-warp">
        <div class="row">
            <div class="col-xl-6 p-0">
                <div class="contact-text">
                    <span>Dashboard</span>
                    <h2>Welcome, {{ shop.name }}</h2>

                    <div style="margin-top: 30px;">
                        <img src="{{ shop.image.url }}" alt="{{ shop.name }}"
                            style="width: 150px; border-radius: 10px; margin-bottom: 20px;">
                        <p><strong>Email:</strong> {{ shop.email }}</p>
                        <p><strong>Phone:</strong> {{ shop.phone }}</p>
                        <p><strong>Address:</strong> {{ shop.address }}</p>
                        <p><strong>Status:</strong>
                            <span class="badge badge-success">{{ shop.status|title }}</span>
                        </p>
                    </div>

                    <div class="row mt-5">
                        <div class="col-md-6">
                            <a href="/shop_add_product" class="btn btn-outline-primary btn-block p-3">
                                <i class="fa fa-plus"></i> Add New Product
                            </a>
                        </div>
                        <div class="col-md-6">
                            <a href="/shop_view_bookings" class="btn btn-outline-info btn-block p-3">
                                <i class="fa fa-list"></i> View Bookings
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<!-- Page section end-->

{% endblock %}
