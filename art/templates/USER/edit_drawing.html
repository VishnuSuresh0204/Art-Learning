{% extends "USER/commen.html" %}

{% load static %}
{% block content %}

<!-- Page section -->
<div class="page-section contact-page">
    <div class="contact-warp">
        <div class="row">
            <div class="col-xl-6 p-0">
                <div class="contact-text">
                    <span>Edit</span>
                    <h2>Edit Your Drawing</h2>

                    <form method="POST" enctype="multipart/form-data" class="contact-form">
                        {% csrf_token %}
                        
                        <label>Title</label>
                        <input type="text" name="title" value="{{ drawing.title }}" required>
                        
                        <label>Price (₹)</label>
                        <input type="number" name="price" value="{{ drawing.price }}" oninput="this.value = this.value.replace(/[^0-9]/g, '');" required>
                        
                        <label>Description</label>
                        <textarea name="description" placeholder="Description" rows="4">{{ drawing.description }}</textarea>
                        
                        <label>Change Image (optional)</label>
                        <div class="mb-3">
                            <img src="{{ drawing.image.url }}" alt="" style="width: 100px; border-radius: 5px; margin-bottom: 10px;">
                        </div>
                        <input type="file" name="image" accept="image/*">
                        
                        <button type="submit" class="site-btn">Update Drawing</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<!-- Page section end -->

{% endblock %}
