{% extends "USER/commen.html" %}
{% block content %}

<div class="page-section contact-page">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="contact-text">
                    <span>Management</span>
                    <h2>Edit Your Artwork</h2>
                </div>

                <form method="POST" enctype="multipart/form-data" class="contact-form">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-12 mb-4">
                            <label>Title</label>
                            <input type="text" name="title" value="{{ drawing.title }}" required>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label>Description</label>
                            <textarea name="description" rows="4" required>{{ drawing.description }}</textarea>
                        </div>
                        <div class="col-md-12 mb-4">
                            <label>Update Image (Optional)</label>
                            <div class="mb-2">
                                <img src="{{ drawing.image.url }}" style="height: 100px; border-radius: 5px;">
                            </div>
                            <input type="file" name="image" class="form-control">
                        </div>
                        <div class="col-md-12">
                            <button type="submit" class="site-btn">Save Changes</button>
                            <a href="/drawing_detail?id={{ drawing.id }}" class="site-btn"
                                style="background: #666; border-color: #666;">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
