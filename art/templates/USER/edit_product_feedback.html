{% extends "USER/commen.html" %}
{% block content %}

<div class="page-section contact-page">
    <div class="contact-warp">
        <h2>Edit Your Feedback</h2>
        <p>Product: <strong>{{ feedback.product.name }}</strong></p>

        <div style="background:white; padding:20px; border-radius:8px; border:1px solid #ddd; max-width:500px;">
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Rating (1-5)</label>
                    <select name="rating" class="form-control">
                        <option value="5" {% if feedback.rating == 5 %}selected{% endif %}>5 - Excellent</option>
                        <option value="4" {% if feedback.rating == 4 %}selected{% endif %}>4 - Good</option>
                        <option value="3" {% if feedback.rating == 3 %}selected{% endif %}>3 - Average</option>
                        <option value="2" {% if feedback.rating == 2 %}selected{% endif %}>2 - Poor</option>
                        <option value="1" {% if feedback.rating == 1 %}selected{% endif %}>1 - Terrible</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Comment</label>
                    <textarea name="comment" class="form-control" rows="4" required>{{ feedback.comment }}</textarea>
                </div>

                <button type="submit" class="site-btn">Update Feedback</button>
                <a href="/my_orders" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
