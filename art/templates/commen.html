{% load static %}
<!DOCTYPE html>
<html lang="zxx">

<head>
	<title>Photo Gallery HTML Template</title>
	<meta charset="UTF-8">
	<meta name="description" content="Photo Gallery HTML Template">
	<meta name="keywords" content="endGam,gGaming, magazine, html">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Favicon -->
	<link href="/static/img/favicon.ico" rel="shortcut icon" />

	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css?family=PT+Sans:400,400i,700,700i" rel="stylesheet">


	<!-- Stylesheets -->
	<link rel="stylesheet" href="/static/css/bootstrap.min.css" />
	<link rel="stylesheet" href="/static/css/font-awesome.min.css" />
	<link rel="stylesheet" href="/static/css/owl.carousel.min.css" />
	<link rel="stylesheet" href="/static/css/animate.css" />

	<!-- Main Stylesheets -->
	<link rel="stylesheet" href="/static/css/style.css" />


	<!--[if lt IE 9]>
		  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
	  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
	<![endif]-->

</head>

<body>
	<!-- Page Preloder -->
	<div id="preloder">
		<div class="loader"></div>
	</div>

	<!-- Top right elements -->

	<!-- Top right elements end -->

	<div class="main-warp">
		<!-- header section -->
		<header class="header-section">
			<div class="header-close">
				<i class="fa fa-times"></i>
			</div>
			<div class="header-warp">
				<a href="" class="site-logo">
					<img src="/static/img/logo.png" alt="">
				</a>
				<img src="/static/img/menu-icon.png" alt="" class="menu-icon">
				<ul class="main-menu">
					<li class="{% if request.path == '/' %}active{% endif %}"><a href="/">Home</a></li>
					<li class="{% if request.path == '/about/' %}active{% endif %}"><a href="/about/">About</a></li>
					<li class="{% if request.path == '/register/' %}active{% endif %}"><a href="/register/">Register</a>
					</li>
					<li class="{% if request.path == '/shop_register/' %}active{% endif %}"><a
							href="/shop_register/">Shop Register</a>
					<li class="{% if request.path == '/login/' %}active{% endif %}"><a href="/login/">Log In</a></li>

				</ul>
				<div class="social-links-warp">
					<div class="social-links">
						<a href=""><i class="fa fa-behance"></i></a>
						<a href=""><i class="fa fa-dribbble"></i></a>
						<a href=""><i class="fa fa-twitter"></i></a>
						<a href=""><i class="fa fa-facebook"></i></a>
						<a href=""><i class="fa fa-pinterest"></i></a>
					</div>
					<div class="social-text">Find us on</div>
				</div>
			</div>
			<div class="copyright">Colorlib 2018 @ All rights reserved</div>
		</header>
		<!-- header section end -->

		{% block content %}
		{% endblock %}


		<!--====== Javascripts & Jquery ======-->
		<script src="/static/js/jquery-3.2.1.min.js"></script>
		<script src="/static/js/bootstrap.min.js"></script>
		<script src="/static/js/owl.carousel.min.js"></script>
		<script src="/static/js/jquery.nicescroll.min.js"></script>
		<script src="/static/js/isotope.pkgd.min.js"></script>
		<script src="/static/js/imagesloaded.pkgd.min.js"></script>
		<script src="/static/js/circle-progress.min.js"></script>
		<script src="/static/js/main.js"></script>

</body>

</html>
