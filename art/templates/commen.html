{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<title>Art Gallery | Premium Creative Platform</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Favicon -->
	<link href="/static/img/favicon.ico" rel="shortcut icon" />

	<!-- Google Fonts: Outfit for heads, Inter for body -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
		rel="stylesheet">

	<!-- Stylesheets -->
	<link rel="stylesheet" href="/static/css/bootstrap.min.css" />
	<link rel="stylesheet" href="/static/css/font-awesome.min.css" />
	<link rel="stylesheet" href="/static/css/owl.carousel.min.css" />
	<link rel="stylesheet" href="/static/css/animate.css" />
	<link rel="stylesheet" href="/static/css/style.css" />

	<style>
		:root {
			--primary: #2563eb;
			--primary-dark: #1d4ed8;
			--accent: #f59e0b;
			--bg-main: #ffffff;
			--bg-subtle: #f8fafc;
			--text-main: #0f172a;
			--text-muted: #64748b;
			--glass: rgba(255, 255, 255, 0.85);
			--border-radius: 16px;
			--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		body {
			font-family: 'Inter', sans-serif;
			color: var(--text-main);
			background: var(--bg-main);
		}

		h1,
		h2,
		h3,
		h4,
		.site-logo {
			font-family: 'Outfit', sans-serif;
		}

		/* Premium Header */
		.header-section {
			background: var(--glass);
			backdrop-filter: blur(12px);
			border-bottom: 1px solid rgba(0, 0, 0, 0.05);
			position: sticky;
			top: 0;
			z-index: 1000;
			transition: var(--transition);
		}

		.header-warp {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 15px 50px;
		}

		.site-logo img {
			max-height: 45px;
			transition: var(--transition);
		}

		.main-menu {
			display: flex;
			list-style: none;
			margin: 0;
			padding: 0;
			gap: 30px;
		}

		.main-menu li a {
			color: var(--text-main);
			font-weight: 600;
			font-size: 0.95rem;
			text-decoration: none;
			position: relative;
			padding: 5px 0;
			transition: var(--transition);
		}

		.main-menu li a::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 0;
			width: 0;
			height: 2px;
			background: var(--primary);
			transition: var(--transition);
		}

		.main-menu li:hover a {
			color: var(--primary);
		}

		.main-menu li.active a::after,
		.main-menu li:hover a::after {
			width: 100%;
		}

		.header-btns {
			display: flex;
			gap: 15px;
			align-items: center;
		}

		.btn-login {
			color: var(--text-main);
			font-weight: 700;
			text-decoration: none;
		}

		.btn-signup {
			background: var(--primary);
			color: white !important;
			padding: 10px 24px;
			border-radius: 100px;
			font-weight: 700;
			text-decoration: none;
			box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
			transition: var(--transition);
		}

		.btn-signup:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
		}

		/* Generic Page Styles */
		.section-spacing {
			padding: 100px 0;
		}

		.footer-minimal {
			padding: 40px 0;
			background: var(--bg-subtle);
			text-align: center;
			border-top: 1px solid rgba(0, 0, 0, 0.05);
			color: var(--text-muted);
			font-size: 0.9rem;
		}
	</style>
</head>

<body>
	<!-- Page Preloder -->
	<div id="preloder">
		<div class="loader"></div>
	</div>

	<!-- header section -->
	<header class="header-section">
		<div class="header-warp">
			<a href="/" class="site-logo">
				<img src="/static/img/logo.png" alt="Art Gallery">
			</a>

			<ul class="main-menu d-none d-lg-flex">
				<li class="{% if request.path == '/' %}active{% endif %}"><a href="/">Home</a></li>
				<li class="{% if request.path == '/about/' %}active{% endif %}"><a href="/about/">About</a></li>
				<li><a href="/register/">Artists</a></li>
				<li><a href="/shop_register/">Shops</a></li>
			</ul>

			<div class="header-btns">
				<a href="/login/" class="btn-login">Log In</a>
				<a href="/register/" class="btn-signup">Join Now</a>
			</div>
		</div>
	</header>
	<!-- header section end -->

	<main>
		{% block content %}
		{% endblock %}
	</main>

	<footer class="footer-minimal">
		<div class="container">
			<p>&copy; 2026 Art Gallery Creative Platform. All rights reserved.</p>
		</div>
	</footer>

	<!--====== Javascripts & Jquery ======-->
	<script src="/static/js/jquery-3.2.1.min.js"></script>
	<script src="/static/js/bootstrap.min.js"></script>
	<script src="/static/js/owl.carousel.min.js"></script>
	<script src="/static/js/jquery.nicescroll.min.js"></script>
	<script src="/static/js/isotope.pkgd.min.js"></script>
	<script src="/static/js/imagesloaded.pkgd.min.js"></script>
	<script src="/static/js/circle-progress.min.js"></script>
	<script src="/static/js/main.js"></script>
</body>

</html>
