{% extends "commen.html" %}
{% load static %}
{% block content %}

<!-- Page section -->
<div class="page-section contact-page">
    <div class="contact-warp">
        <div class="row">
            <div class="col-xl-6 p-0">
                <div class="contact-text">
                    <span>Partner with Us</span>
                    <h2>Shop Registration</h2>
                    
                    {% if messages %}
                    {% for msg in messages %}
                    <p style="color:red; font-weight:bold;">{{ msg }}</p>
                    {% endfor %}
                    {% endif %}

                    <form class="contact-form" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Shop Name -->
                        <input 
                            type="text" 
                            name="username" 
                            placeholder="Shop Name"
                            required
                            minlength="3"
                            maxlength="50"
                            pattern="^[A-Za-z0-9 ]+$"
                            title="Shop name should contain only letters and numbers (3-50 characters)"
                            value="{{ values.username }}"
                        >

                        <!-- Email -->
                        <input 
                            type="email" 
                            name="email" 
                            placeholder="Shop Email"
                            required
                            title="Please enter a valid email address"
                            value="{{ values.email }}"
                        >

                        <!-- Phone -->
                        <input 
                            type="tel" 
                            name="phone" 
                            placeholder="Phone Number"
                            required
                            pattern="[0-9]{10}"
                            maxlength="10"
                            title="Enter a valid 10 digit phone number"
                            value="{{ values.phone }}"
                        >

                        <!-- Address -->
                        <input 
                            type="text" 
                            name="address" 
                            placeholder="Shop Address"
                            required
                            minlength="5"
                            maxlength="200"
                            title="Address must be at least 5 characters"
                            value="{{ values.address }}"
                        >

                        <!-- Shop Image -->
                        <label style="color:#777; margin-top:10px;">Shop Logo / Image</label>
                        <input 
                            type="file" 
                            name="image"
                            accept="image/png, image/jpeg, image/jpg"
                            required
                            style="padding:10px; border:1px solid #ddd;"
                            title="Upload JPG or PNG image only"
                        >

                        <!-- Password -->
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="Password"
                            required
                            minlength="6"
                            pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*#?&]{6,}$"
                            title="Password must contain at least 6 characters including one letter and one number"
                        >

                        <button class="site-btn" style="margin-top:15px;">
                            Register Shop
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<!-- Page section end-->

{% endblock %}
