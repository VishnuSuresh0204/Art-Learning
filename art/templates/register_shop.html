{% extends "commen.html" %}

{% load static %}
{% block content %}

<!-- Page section -->
<div class="page-section contact-page">
    <div class="contact-warp">
        <div class="row">
            <div class="col-xl-6 p-0">
                <div class="contact-text">
                    <span>Partner with Us</span>
                    <h2>Shop Registration</h2>

                    <form class="contact-form" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <input type="text" name="username" placeholder="Shop Name" required>
                        <input type="email" name="email" placeholder="Shop Email" required>

                        <input type="text" name="phone" placeholder="Phone Number" required>

                        <input type="text" name="address" placeholder="Shop Address" required>

                        <label style="color:#777; margin-top:10px;">Shop Logo/Image</label>
                        <input type="file" name="image" style="padding:10px; border:1px solid #ddd;" required>

                        <input type="password" name="password" placeholder="Password" required>

                        <button class="site-btn" style="margin-top:15px;">Register Shop</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<!-- Page section end-->

{% endblock %}
